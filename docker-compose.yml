# Production compose for Microservice Boilerplate
# Requires .env file in same directory
# DB/Redis/RabbitMQ are expected to be reachable via env-configured hosts

services:
  microservice:
    build:
      context: .
      dockerfile: Dockerfile
    image: microservice-boilerplate:latest
    container_name: microservice-boilerplate
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    ports:
      # Bind to loopback only - expose publicly via a reverse proxy (nginx, Traefik)
      - "127.0.0.1:3000:3000"   # HTTP API
      - "127.0.0.1:50051:50051" # gRPC
    # Run migrations before starting the app (instrumentation preload matches Dockerfile CMD)
    command: sh -c "npm run migrate && node --import ./dist/instrumentation.js dist/index.js"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
